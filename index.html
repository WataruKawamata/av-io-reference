<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IORef</title>
<meta name="description" content="Physical connector reference for professional AV equipment — inputs and outputs at a glance.">
<meta name="theme-color" content="#111318">

<!-- Canonical URL -->
<link rel="canonical" href="https://watarukawamata.github.io/av-io-reference/">

<!-- OGP (SNS・ブックマーク共有時の表示) -->
<meta property="og:title"       content="IORef">
<meta property="og:description" content="Physical connector reference for professional AV equipment — inputs and outputs at a glance.">
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://watarukawamata.github.io/av-io-reference/">
<meta name="twitter:card"       content="summary">

<!-- Favicon: standard browsers -->
<link rel="icon" type="image/x-icon"      href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<!-- Apple Touch Icon (iOS home screen / Safari tab) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TOPBAR ──────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-row1">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </div>
      <span class="logo-text">AV I/O REFERENCE</span>
    </div>
    <div class="topbar-right" id="deviceCount"></div>
  </div>
  <div class="topbar-row2">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Search device…  [ / ] focus  [ Esc ] clear"
             autocomplete="off" spellcheck="false">
    </div>
  </div>
</header>

<!-- ── SIDEBAR (category tabs + device list) ──────────────────────────────── -->
<div class="sidebar-panel" id="sidebarPanel">
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
    <span class="sidebar-toggle-icon">▾</span>
    <span id="sidebarToggleLabel">DEVICE LIST</span>
  </button>
  <div class="sidebar-scroll" id="sidebarWrap"></div>
</div>

<!-- ── DETAIL PANEL ────────────────────────────────────────────────────────── -->
<div class="detail-panel">
  <div class="detail-scroll">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <line x1="8" y1="9" x2="16" y2="9"/>
        <line x1="8" y1="13" x2="12" y2="13"/>
        <circle cx="17" cy="17" r="2"/>
        <line x1="19" y1="15" x2="21" y2="13"/>
      </svg>
      <h2>Select a device</h2>
      <p>Choose from the category list above · press <kbd>/</kbd> to search</p>
    </div>
    <div id="deviceDetail" style="display:none;"></div>
  </div>
</div>

<script src="devices.js"></script>
<script src="app.js"></script>
</body>
</html>
